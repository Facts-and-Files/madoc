name: Deploy to Kali
run-name: ${{ github.actor }} is deploying to Kali...

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger remote Git checkout and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            REPO_URL=git@github.com:Facts-and-Files/madoc.git
            TARGET_DIR=~/madoc

            echo "Checking repo at $TARGET_DIR..."
            if [ -d "$TARGET_DIR/.git" ]; then
              echo "Repository exists. Pulling latest changes..."
              git -C "$TARGET_DIR" fetch --all
              git -C "$TARGET_DIR" reset --hard origin/main
            else
              echo "Repository not found. Cloning..."
              git clone "$REPO_URL" "$TARGET_DIR"
            fi

            echo "Populating .env file..."
            echo "${{ secrets.ENV }}" > "$TARGET_DIR"/.env

            echo "Environment file written to .env"

            echo "Docker updating service..."
            cd "$TARGET_DIR"
            docker compose pull || true
            docker compose up -d --no-deps

            echo "Deployment complete."
