services:

  gateway:
    image: ghcr.io/digirati-co-uk/madoc-nginx:${MADOC_VERSION:-main}
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-gateway
    restart: unless-stopped
    depends_on:
      - tasks-api
      - model-api
      - madoc-ts
      - config-service
      - storage-api
      - okra
      - search
    ports:
      - "${PORTS_GATEWAY:-8878}:8080"
    expose:
      - "8080"
    environment:
      VIRTUAL_HOST: "${VIRTUAL_HOST:-}"
      VIRTUAL_PORT: "8080"
      LETSENCRYPT_HOST: "${LETSENCRYPT_HOST:-}"
      LETSENCRYPT_EMAIL: "${LETSENCRYPT_EMAIL:-}"

  gateway-redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - gateway_redis_data:/data:Z

  shared-postgres:
    image: ghcr.io/digirati-co-uk/madoc-postgres:${MADOC_VERSION:-main}
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MADOC_TS_USER: ${POSTGRES_MADOC_TS_USER}
      POSTGRES_MADOC_TS_SCHEMA: ${POSTGRES_MADOC_TS_SCHEMA}
      POSTGRES_MADOC_TS_PASSWORD: ${POSTGRES_MADOC_TS_PASSWORD}
      POSTGRES_TASKS_API_USER: ${POSTGRES_TASKS_API_USER}
      POSTGRES_TASKS_API_SCHEMA: ${POSTGRES_TASKS_API_SCHEMA}
      POSTGRES_TASKS_API_PASSWORD: ${POSTGRES_TASKS_API_PASSWORD}
      POSTGRES_MODELS_API_USER: ${POSTGRES_MODELS_API_USER}
      POSTGRES_MODELS_API_SCHEMA: ${POSTGRES_MODELS_API_SCHEMA}
      POSTGRES_MODELS_API_PASSWORD: ${POSTGRES_MODELS_API_PASSWORD}
      POSTGRES_CONFIG_SERVICE_USER: ${POSTGRES_CONFIG_SERVICE_USER}
      POSTGRES_CONFIG_SERVICE_SCHEMA: ${POSTGRES_CONFIG_SERVICE_SCHEMA}
      POSTGRES_CONFIG_SERVICE_PASSWORD: ${POSTGRES_CONFIG_SERVICE_PASSWORD}
      POSTGRES_SEARCH_API_USER: ${POSTGRES_SEARCH_API_USER}
      POSTGRES_SEARCH_API_SCHEMA: ${POSTGRES_SEARCH_API_SCHEMA}
      POSTGRES_SEARCH_API_PASSWORD: ${POSTGRES_SEARCH_API_PASSWORD}
    volumes:
      - shared_postgres_data:/var/lib/postgresql/data:Z

  madoc-ts:
    image: ghcr.io/digirati-co-uk/madoc-api:${MADOC_VERSION:-main}
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-madoc-ts
    restart: unless-stopped
    depends_on:
      - shared-postgres
      - gateway-redis
    volumes:
      - jwt:/home/node/app/service-jwt-responses:Z
      - files:/home/node/app/files:Z
      - ./translations/en:/home/node/app/translations/en:Z
    environment:
      DATABASE_HOST: shared-postgres
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_USER: ${POSTGRES_MADOC_TS_USER}
      DATABASE_SCHEMA: ${POSTGRES_MADOC_TS_SCHEMA}
      DATABASE_PASSWORD: ${POSTGRES_MADOC_TS_PASSWORD}
      REDIS_HOST: gateway-redis
      STORAGE_FILE_DIRECTORY: /home/node/app/files
      NODE_ENV: production
      MIGRATE: "true"
      MADOC_INSTALLATION_CODE: ${MADOC_INSTALLATION_CODE}
      API_GATEWAY: http://gateway:8080
      GATEWAY_HOST: ${GATEWAY_HOST}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURITY: ${SMTP_SECURITY:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM_USER: ${MAIL_FROM_USER:-}

  tasks-api:
    image: ghcr.io/digirati-co-uk/tasks-api:latest
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-tasks-api
    restart: unless-stopped
    depends_on:
      - shared-postgres
      - gateway-redis
    environment:
      SERVER_PORT: 3000
      DATABASE_HOST: shared-postgres
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_USER: ${POSTGRES_TASKS_API_USER}
      DATABASE_SCHEMA: ${POSTGRES_TASKS_API_SCHEMA}
      DATABASE_PASSWORD: ${POSTGRES_TASKS_API_PASSWORD}
      QUEUE_LIST: ${TASKS_QUEUE_LIST:-tasks-api,madoc-ts}
      REDIS_HOST: gateway-redis

  storage-api:
    image: ghcr.io/digirati-co-uk/storage-api:latest
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-storage-api
    restart: unless-stopped
    environment:
      GATEWAY_HOST: ${GATEWAY_HOST}
    volumes:
      - storage_api_data:/home/node/app/files:Z

  model-api:
    image: digirati/capture-models:latest
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-model-api
    restart: unless-stopped
    depends_on:
      - shared-postgres
    environment:
      SERVER_PORT: 3000
      DATABASE_HOST: shared-postgres
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_USER: ${POSTGRES_MODELS_API_USER}
      DATABASE_SCHEMA: ${POSTGRES_MODELS_API_SCHEMA}
      DATABASE_PASSWORD: ${POSTGRES_MODELS_API_PASSWORD}

  config-service:
    image: digirati/madoc_config_service_django:175410fc5b7dbef4cc259686564fbedeb60c8789
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-config-service
    restart: unless-stopped
    depends_on:
      - shared-postgres
    environment:
      USE_DOCKER: "yes"
      IPYTHONDIR: /app/.ipython
      MIGRATE: "True"
      LOAD: "False"
      DJANGO_DEBUG: "False"
      WAITRESS: "False"
      POSTGRES_HOST: shared-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_CONFIG_SERVICE_USER}
      POSTGRES_SCHEMA: ${POSTGRES_CONFIG_SERVICE_SCHEMA}
      POSTGRES_PASSWORD: ${POSTGRES_CONFIG_SERVICE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgres://${POSTGRES_CONFIG_SERVICE_USER}:${POSTGRES_CONFIG_SERVICE_PASSWORD}@shared-postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}

  search:
    image: digirati/madoc-search:latest
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-search
    restart: unless-stopped
    depends_on:
      - shared-postgres
    environment:
      BROWSABLE: "False"
      USE_DOCKER: "yes"
      IPYTHONDIR: /app/.ipython
      MIGRATE: "True"
      LOAD: "False"
      DJANGO_DEBUG: "False"
      DEBUG: "False"
      WAITRESS: "False"
      POSTGRES_HOST: shared-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_SEARCH_API_USER}
      POSTGRES_SCHEMA: ${POSTGRES_SEARCH_API_SCHEMA}
      POSTGRES_PASSWORD: ${POSTGRES_SEARCH_API_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_URL: postgres://${POSTGRES_SEARCH_API_USER}:${POSTGRES_SEARCH_API_PASSWORD}@shared-postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}

  okra:
    image: digirati/okra:latest
    container_name: ${COMPOSE_PROJECT_NAME:-madoc}-okra
    restart: unless-stopped

volumes:
  jwt:
  shared_postgres_data:
  files:
  storage_api_data:
  gateway_redis_data:
